version: 2

models:
  - name: dim_customers
    description: "Dimensão de clientes (cadastro e localização) para consumo analítico."
    columns:
      - name: customer_id
        description: "Identificador do cliente no dataset Olist."
        tests:
          - not_null
          - unique
      - name: customer_unique_id
        description: "Identificador único do cliente (pessoa) no dataset Olist."
        tests:
          - not_null
      - name: customer_zip_code_prefix
        description: "Prefixo do CEP do cliente (5 dígitos)."
      - name: customer_city
        description: "Cidade do cliente."
      - name: customer_state
        description: "UF do cliente."

  - name: dim_products
    description: "Dimensão de produtos com categoria original e tradução para inglês."
    columns:
      - name: product_id
        description: "Identificador do produto."
        tests:
          - not_null
          - unique
      - name: product_category_name
        description: "Nome da categoria do produto (português) conforme dataset Olist."
      - name: product_category_name_english
        description: "Nome da categoria do produto (inglês), via tabela de tradução."
      - name: product_name_length
        description: "Tamanho (em caracteres) do nome do produto."
      - name: product_description_length
        description: "Tamanho (em caracteres) da descrição do produto."
      - name: product_photos_qty
        description: "Quantidade de fotos do produto."
      - name: product_weight_g
        description: "Peso do produto em gramas."
      - name: product_length_cm
        description: "Comprimento do produto (cm)."
      - name: product_height_cm
        description: "Altura do produto (cm)."
      - name: product_width_cm
        description: "Largura do produto (cm)."

  - name: dim_sellers
    description: "Dimensão de vendedores (seller) e sua localização."
    columns:
      - name: seller_id
        description: "Identificador do vendedor."
        tests:
          - not_null
          - unique
      - name: seller_zip_code_prefix
        description: "Prefixo do CEP do vendedor (5 dígitos)."
      - name: seller_city
        description: "Cidade do vendedor."
      - name: seller_state
        description: "UF do vendedor."

  - name: dim_dates
    description: "Dimensão de datas construída a partir do intervalo min/max das datas presentes em stg_orders."
    columns:
      - name: date_day
        description: "Data (granularidade diária)."
        tests:
          - not_null
          - unique
      - name: year
        description: "Ano."
      - name: quarter
        description: "Trimestre (1-4)."
      - name: month
        description: "Mês (1-12)."
      - name: month_name
        description: "Nome do mês (depende de lc_time do PostgreSQL)."
      - name: day
        description: "Dia do mês (1-31)."
      - name: day_of_week
        description: "Dia da semana ISO (1=Segunda ... 7=Domingo)."
      - name: week_of_year
        description: "Semana do ano."
      - name: is_weekend
        description: "Indicador de fim de semana (sábado/domingo)."

  - name: fct_orders
    description: "Fato de pedidos (1 linha por order_id) com status e métricas de entrega."
    columns:
      - name: order_id
        description: "Identificador do pedido."
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Identificador do cliente que realizou o pedido."
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: purchased_at
        description: "Timestamp de compra do pedido."
      - name: estimated_delivery_at
        description: "Data estimada de entrega do pedido."

  - name: fct_order_items
    description: "Fato de itens do pedido (1 linha por item) com valores e frete."
    columns:
      - name: order_id
        description: "Identificador do pedido."
        tests:
          - not_null
          - relationships:
              to: ref('fct_orders')
              field: order_id
      - name: order_item_id
        description: "Identificador sequencial do item dentro do pedido."
        tests:
          - not_null
      - name: product_id
        description: "Produto do item."
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_id
      - name: seller_id
        description: "Vendedor responsável pelo item."
        tests:
          - not_null
          - relationships:
              to: ref('dim_sellers')
              field: seller_id
      - name: shipping_limit_date
        description: "Data limite de envio (shipping_limit_date)."
      - name: price
        description: "Preço do item."
      - name: freight_value
        description: "Valor do frete do item."
      - name: item_total_value
        description: "Soma de price + freight_value (quando nulos, tratados como 0)."

  - name: fct_payments
    description: "Fato de pagamentos do pedido (pode haver múltiplos por pedido)."
    columns:
      - name: order_id
        description: "Identificador do pedido."
        tests:
          - not_null
          - relationships:
              to: ref('fct_orders')
              field: order_id
      - name: payment_sequential
        description: "Sequencial do pagamento dentro do pedido."
        tests:
          - not_null

  - name: fct_reviews
    description: "Fato de reviews do pedido."
    columns:
      - name: review_id
        description: "Identificador do review."
        tests:
          - not_null
          - unique
      - name: order_id
        description: "Identificador do pedido avaliado."
        tests:
          - not_null
          - relationships:
              to: ref('fct_orders')
              field: order_id

  - name: mart_sales_daily
    description: "Métricas de vendas por dia (baseado em purchased_at)."
    columns:
      - name: order_date
        description: "Data do pedido (purchased_at::date)."
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_day

  - name: mart_delivery_performance
    description: "Métricas de performance de entrega por UF do cliente."
    columns:
      - name: customer_state
        description: "UF do cliente."

  - name: mart_seller_performance
    description: "Métricas de performance por vendedor."
    columns:
      - name: seller_id
        description: "Identificador do vendedor."
        tests:
          - not_null
          - relationships:
              to: ref('dim_sellers')
              field: seller_id

  - name: mart_product_performance
    description: "Métricas de performance por categoria de produto (inglês)."
    columns:
      - name: product_category_name_english
        description: "Categoria do produto em inglês (ou 'unknown' quando sem tradução)."
        tests:
          - not_null

  - name: mart_data_quality_summary
    description: "Resumo simples (long format) de métricas de qualidade do dado, calculadas a partir das fatos Gold."
    columns:
      - name: metric_name
        description: "Nome da métrica de qualidade."
        tests:
          - not_null
      - name: metric_value
        description: "Valor numérico da métrica."
      - name: checked_at
        description: "Timestamp de execução do check."
        tests:
          - not_null
